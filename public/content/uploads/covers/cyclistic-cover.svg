<svg viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cyclistic Bike-Share Case Study cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16314f" />
      <stop offset="100%" stop-color="#0b1c30" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0f7d72" />
      <stop offset="100%" stop-color="#5eead4" />
    </linearGradient>
  </defs>

  <rect width="520" height="400" fill="url(#bg)" />

  <!-- decorative abstract bar-chart motif (member vs casual pattern, not literal data) -->
  <g opacity="0.9">
    <rect x="40"  y="230" width="18" height="90" rx="3" fill="url(#bar)" />
    <rect x="66"  y="270" width="18" height="50" rx="3" fill="#1f3a5c" />
    <rect x="100" y="190" width="18" height="130" rx="3" fill="url(#bar)" />
    <rect x="126" y="285" width="18" height="35" rx="3" fill="#1f3a5c" />
    <rect x="160" y="170" width="18" height="150" rx="3" fill="url(#bar)" />
    <rect x="186" y="275" width="18" height="45" rx="3" fill="#1f3a5c" />
    <rect x="220" y="200" width="18" height="120" rx="3" fill="url(#bar)" />
    <rect x="246" y="280" width="18" height="40" rx="3" fill="#1f3a5c" />
  </g>

  <!-- category pill -->
  <g>
    <rect x="40" y="36" width="128" height="30" rx="15" fill="rgba(94,234,212,0.16)" />
    <text x="104" y="56" text-anchor="middle" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#5eead4" letter-spacing="0.03em">DATA ANALYTICS</text>
  </g>

  <text x="40" y="110" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="27" font-weight="800" fill="#f3f5f8">Cyclistic Bike-Share</text>
  <text x="40" y="142" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="27" font-weight="800" fill="#f3f5f8">Case Study</text>

  <line x1="300" y1="60" x2="300" y2="340" stroke="#1f3a5c" stroke-width="1" />

  <text x="330" y="230" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="34" font-weight="800" fill="#5eead4">5,800+</text>
  <text x="330" y="254" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#a9b6c6">bikes across 600 stations</text>

  <text x="330" y="300" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="34" font-weight="800" fill="#f3f5f8">8AM &amp; 5PM</text>
  <text x="330" y="324" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#a9b6c6">member peak commute times</text>
</svg>
