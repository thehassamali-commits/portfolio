<svg viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NYC Yellow Taxi 2017 EDA cover">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16314f" />
      <stop offset="100%" stop-color="#0b1c30" />
    </linearGradient>
  </defs>

  <rect width="520" height="400" fill="url(#bg2)" />

  <!-- decorative scatter motif suggesting a distance-vs-fare correlation trend -->
  <g opacity="0.95">
    <line x1="40" y1="320" x2="40" y2="70" stroke="#1f3a5c" stroke-width="1.5" />
    <line x1="40" y1="320" x2="290" y2="320" stroke="#1f3a5c" stroke-width="1.5" />
    <line x1="45" y1="300" x2="270" y2="110" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.55" />
    <circle cx="60"  cy="290" r="5" fill="#0f7d72" />
    <circle cx="85"  cy="270" r="5" fill="#0f7d72" />
    <circle cx="100" cy="255" r="5" fill="#5eead4" />
    <circle cx="120" cy="230" r="5" fill="#0f7d72" />
    <circle cx="140" cy="240" r="5" fill="#5eead4" />
    <circle cx="155" cy="200" r="5" fill="#0f7d72" />
    <circle cx="175" cy="190" r="5" fill="#5eead4" />
    <circle cx="195" cy="165" r="5" fill="#0f7d72" />
    <circle cx="215" cy="175" r="5" fill="#5eead4" />
    <circle cx="235" cy="140" r="5" fill="#0f7d72" />
    <circle cx="255" cy="120" r="5" fill="#5eead4" />
  </g>

  <g>
    <rect x="40" y="36" width="128" height="30" rx="15" fill="rgba(94,234,212,0.16)" />
    <text x="104" y="56" text-anchor="middle" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#5eead4" letter-spacing="0.03em">DATA ANALYTICS</text>
  </g>

  <line x1="300" y1="60" x2="300" y2="340" stroke="#1f3a5c" stroke-width="1" />

  <text x="330" y="110" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="24" font-weight="800" fill="#f3f5f8">NYC Yellow Taxi</text>
  <text x="330" y="140" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="24" font-weight="800" fill="#f3f5f8">2017 EDA</text>

  <text x="330" y="220" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="34" font-weight="800" fill="#5eead4">22,699</text>
  <text x="330" y="244" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#a9b6c6">taxi trips analyzed</text>

  <text x="330" y="290" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="34" font-weight="800" fill="#f3f5f8">r = 0.767</text>
  <text x="330" y="314" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="600" fill="#a9b6c6">distance–fare correlation</text>
</svg>
